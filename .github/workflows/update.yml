name: Weekly Intelligence Update

on:
  schedule:
    - cron: '0 22 * * 0-4'       # 월~금 오전 7시 KST
  workflow_dispatch:               # 수동 실행
  repository_dispatch:             # 직접 질문 트리거
    types: [custom_query]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 분기 1: 정기/수동 실행 → JSON 5개 생성
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: Generate analysis JSON files (scheduled/manual)
        if: github.event_name != 'repository_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 분기 2: 직접 질문 → custom.json 생성
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: Generate custom query JSON
        if: github.event_name == 'repository_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CUSTOM_QUESTION: ${{ github.event.client_payload.question }}
          REQUEST_ID: ${{ github.event.client_payload.request_id }}
        run: python generate_custom.py

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # gh-pages 브랜치 없으면 자동 생성
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: Ensure gh-pages branch exists
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin gh-pages; then
            echo "gh-pages exists"
          else
            git checkout --orphan gh-pages
            git rm -rf .
            git commit --allow-empty -m "init: create gh-pages"
            git push origin gh-pages
            git checkout main
          fi

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-dir
          fetch-depth: 1

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # data/ 복사 (정기: 5개 json / 직접질문: custom.json)
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: Copy data files to gh-pages
        run: |
          mkdir -p gh-pages-dir/data
          cp -r data/. gh-pages-dir/data/

      # index.html 복사 — PAT 주입 (ghp_ 패턴, Secret Scanning 통과)
      - name: Inject PAT into index.html and copy to gh-pages
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          sed "s|__GH_PAT__|${GH_PAT}|g" index.html > gh-pages-dir/index.html

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # gh-pages에 커밋·푸시
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-dir
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html
          git diff --staged --quiet || \
            git commit -m "deploy: $(date +'%Y-%m-%d %H:%M KST')"
          git push origin gh-pages

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # 이메일 발송 (정기/수동만)
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: Send email (scheduled)
        if: github.event_name == 'schedule'
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
        run: python send_mail.py

      - name: Send email (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL_ME }}
        run: python send_mail.py
