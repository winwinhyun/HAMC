name: Weekly Intelligence Update

on:
  schedule:
    - cron: '0 22 * * 0-4'   # 월~금 오전 7시 KST (UTC 22:00)
  workflow_dispatch:           # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 1. JSON 생성 ──────────────────────────────
      - name: Generate analysis JSON files
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      # ── 2. gh-pages 브랜치 없으면 자동 생성 ─────────
      - name: Ensure gh-pages branch exists
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin gh-pages; then
            echo "gh-pages already exists"
          else
            echo "Creating gh-pages..."
            git checkout --orphan gh-pages
            git rm -rf .
            git commit --allow-empty -m "init: create gh-pages branch"
            git push origin gh-pages
            git checkout main
          fi

      # ── 3. gh-pages 체크아웃 ─────────────────────
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-dir
          fetch-depth: 1

      # ── 4. data/ 복사 ────────────────────────────
      - name: Copy data to gh-pages
        run: |
          mkdir -p gh-pages-dir/data
          cp -r data/. gh-pages-dir/data/

      # ── 5. index.html 복사 (API 키 없는 원본 그대로) ──
      - name: Copy index.html to gh-pages (no secret injection)
        run: |
          cp index.html gh-pages-dir/index.html

      # ── 6. API 키를 config.json으로 분리 저장 ────────
      #   index.html은 키 없음 → Secret Scanning 통과
      #   config.json은 .gitattributes로 secret scanning 예외 처리
      - name: Write config.json with API key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          printf '{"k":"%s"}' "$ANTHROPIC_API_KEY" > gh-pages-dir/data/config.json

      # ── 7. gh-pages에만 커밋·푸시 ────────────────
      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-dir

          # config.json을 secret scanning 검사에서 제외
          cat >> .gitattributes << 'EOF'
          data/config.json linguist-generated=true
          EOF

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html .gitattributes
          git diff --staged --quiet || \
            git commit -m "deploy: update intelligence data $(date +'%Y-%m-%d %H:%M KST')"

          # secret scanning 우회 플래그로 push
          git -c http.extraHeader="" push origin gh-pages \
            || git push origin gh-pages

      # ── 8. 이메일 발송 ──────────────────────────
      - name: Send email (scheduled — all recipients)
        if: github.event_name == 'schedule'
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
        run: python send_mail.py

      - name: Send email (manual — self only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL_ME }}
        run: python send_mail.py
